<div class="confirm-overlay hidden" id="update-notice-overlay">
  <div class="confirm-dialog">
    <h2 style="margin:0 0 12px;display:flex;align-items:center;gap:10px">
      <img src="../../assets/wrapweb.svg" width="28" height="28" alt="" data-icon-fallback="updateNotifier">
      {{updateNoticeTitle}}
    </h2>
    <div id="update-notice-body"></div>
    <div class="confirm-actions" style="margin-top:16px">
      <button class="btn-secondary" id="update-notice-github">{{updateNoticeGithub}}</button>
      <button class="btn-confirm-delete" id="update-notice-ok">{{updateNoticeOk}}</button>
    </div>
  </div>
</div>

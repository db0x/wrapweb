<div class="dialog-overlay hidden">
  <div class="dialog edit-dialog">
    <div class="dialog-header">
      <span class="dialog-title">{{editTitle}}</span>
      <button class="dialog-close" id="edit-close">✕</button>
    </div>
    <div class="edit-scroll-wrapper" id="edit-scroll-wrapper">
      <div class="dialog-fields">
        <div class="dialog-field">
          <label>{{createProfile}}</label>
          <div class="value" id="edit-profile-label"
               style="padding:6px 0;color:var(--card-url);font-size:0.9em"></div>
        </div>
        <div class="dialog-field">
          <label>{{createName}}</label>
          <input type="text" id="edit-name" placeholder="Meine App">
        </div>
        <div class="dialog-field">
          <label>{{createUrl}} *</label>
          <input type="text" id="edit-url" placeholder="https://app.example.com"
                 autocomplete="off" spellcheck="false">
          <span class="field-hint" id="edit-url-hint"></span>
        </div>
        <div class="dialog-field">
          <label>{{createIcon}}</label>
          <div class="icon-picker-row">
            <img id="edit-icon-preview" src="{{appDefaultSrc}}" alt="" class="icon-field-preview">
            <button type="button" id="edit-icon-btn" class="icon-picker-btn">
              <span id="edit-icon-name" class="icon-picker-placeholder">{{createIconChoose}}</span>
            </button>
            <button type="button" id="edit-icon-clear" class="icon-clear-btn" style="display:none">✕</button>
          </div>
        </div>
        <hr class="dialog-section-divider">
        <div class="dialog-section-label">{{createAdvanced}}</div>
        <div class="dialog-field dialog-field-row">
          <div class="dialog-field">
            <label>{{createWidth}}</label>
            <input type="number" id="edit-width" placeholder="1280">
            <span class="field-hint" id="edit-width-hint"></span>
          </div>
          <div class="dialog-field">
            <label>{{createHeight}}</label>
            <input type="number" id="edit-height" placeholder="1024">
            <span class="field-hint" id="edit-height-hint"></span>
          </div>
        </div>
        <div class="dialog-field">
          <label>{{createUAgent}}
            <span class="field-help" data-tooltip="{{tooltipUAgent}}">?</span>
          </label>
          <select id="edit-useragent">
            <option value="">{{createUaDefault}}</option>
          </select>
        </div>
        <div class="dialog-field">
          <label>{{createDomains}}
            <span class="field-help" data-tooltip="{{tooltipDomains}}">?</span>
          </label>
          <div class="domain-field-wrapper">
            <ul class="domain-list" id="edit-domain-list"></ul>
            <div class="domain-add-row">
              <input type="text" id="edit-domain-input" placeholder="accounts.google.com"
                     autocomplete="off" spellcheck="false">
              <button type="button" id="edit-domain-add" class="domain-add-btn">+</button>
            </div>
          </div>
        </div>
        <button type="button" class="dialog-field-toggle" id="edit-coi">
          <span class="toggle-switch"></span>
          <span>{{createCoi}}
            <span class="field-help" data-tooltip="{{tooltipCoi}}">?</span>
          </span>
        </button>
        <button type="button" class="dialog-field-toggle" id="edit-single-instance">
          <span class="toggle-switch"></span>
          <span>{{createSingleInstance}}
            <span class="field-help" data-tooltip="{{tooltipSingleInstance}}">?</span>
          </span>
        </button>
        <button type="button" class="dialog-field-toggle" id="edit-mail-handler">
          <span class="toggle-switch"></span>
          <span>{{createMailHandler}}
            <span class="field-help" data-tooltip="{{tooltipMailHandler}}">?</span>
          </span>
        </button>
        <div class="dialog-field" id="edit-plugin-field" style="display:none">
          <label>{{createPlugin}}
            <span class="field-help" data-tooltip="{{tooltipPlugin}}">?</span>
          </label>
          <select id="edit-plugin">
            <option value="">{{createPluginNone}}</option>
          </select>
        </div>
        <hr class="dialog-section-divider">
        <div id="edit-info-section"></div>
      </div>
    </div>
    <div class="confirm-actions">
      <button class="btn-cancel" id="edit-cancel">{{createCancel}}</button>
      <button class="btn-save" id="edit-save" disabled>{{editSave}}</button>
    </div>
  </div>
</div>

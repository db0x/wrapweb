<div class="dialog-overlay hidden">
  <div class="dialog">
    <div class="dialog-header">
      <span class="dialog-title">{{createTitle}}</span>
      <button class="dialog-close" id="create-close">✕</button>
    </div>
    <div class="dialog-fields">
      <div class="dialog-field">
        <label>{{createProfile}} *</label>
        <input type="text" id="create-profile" placeholder="meine-app"
               autocomplete="off" spellcheck="false">
        <span class="field-hint" id="create-profile-hint"></span>
      </div>
      <div class="dialog-field">
        <label>{{createName}}</label>
        <input type="text" id="create-name" placeholder="Meine App">
      </div>
      <div class="dialog-field">
        <label>{{createUrl}} *</label>
        <input type="text" id="create-url" placeholder="https://app.example.com"
               autocomplete="off" spellcheck="false">
        <span class="field-hint" id="create-url-hint"></span>
      </div>
      <div class="dialog-field">
        <label>{{createIcon}}</label>
        <div class="icon-picker-row">
          <img id="create-icon-preview" src="{{appDefaultSrc}}" alt="" class="icon-field-preview">
          <button type="button" id="create-icon-btn" class="icon-picker-btn">
            <span id="create-icon-name" class="icon-picker-placeholder">{{createIconChoose}}</span>
          </button>
          <button type="button" id="create-icon-clear" class="icon-clear-btn" style="display:none">✕</button>
        </div>
      </div>
      <hr class="dialog-section-divider">
      <div class="dialog-section-label">{{createAdvanced}}</div>
      <div class="dialog-field dialog-field-row">
        <div class="dialog-field">
          <label>{{createWidth}}</label>
          <input type="number" id="create-width" placeholder="1280">
          <span class="field-hint" id="create-width-hint"></span>
        </div>
        <div class="dialog-field">
          <label>{{createHeight}}</label>
          <input type="number" id="create-height" placeholder="1024">
          <span class="field-hint" id="create-height-hint"></span>
        </div>
      </div>
      <div class="dialog-field">
        <label>{{createUAgent}}
          <span class="field-help" data-tooltip="{{tooltipUAgent}}">?</span>
        </label>
        <select id="create-useragent">
          <option value="">{{createUaDefault}}</option>
        </select>
      </div>
      <div class="dialog-field">
        <label>{{createDomains}}
          <span class="field-help" data-tooltip="{{tooltipDomains}}">?</span>
        </label>
        <div class="domain-field-wrapper">
          <ul class="domain-list" id="create-domain-list"></ul>
          <div class="domain-add-row">
            <input type="text" id="create-domain-input" placeholder="accounts.google.com"
                   autocomplete="off" spellcheck="false">
            <button type="button" id="create-domain-add" class="domain-add-btn">+</button>
          </div>
        </div>
      </div>
      <div class="dialog-field">
        <label>{{createRoutingUrls}}
          <span class="field-help" data-tooltip="{{tooltipRoutingUrls}}">?</span>
        </label>
        <div class="domain-field-wrapper">
          <ul class="domain-list" id="create-routing-list"></ul>
          <div class="domain-add-row">
            <input type="text" id="create-routing-input" placeholder="*.example.com/docs/*"
                   autocomplete="off" spellcheck="false">
            <button type="button" id="create-routing-add" class="domain-add-btn">+</button>
          </div>
        </div>
        <span class="field-hint" id="create-routing-hint"></span>
      </div>
      <button type="button" class="dialog-field-toggle" id="create-coi">
        <span class="toggle-switch"></span>
        <span>{{createCoi}}
          <span class="field-help" data-tooltip="{{tooltipCoi}}">?</span>
        </span>
      </button>
      <button type="button" class="dialog-field-toggle" id="create-single-instance">
        <span class="toggle-switch"></span>
        <span>{{createSingleInstance}}
          <span class="field-help" data-tooltip="{{tooltipSingleInstance}}">?</span>
        </span>
      </button>
      <button type="button" class="dialog-field-toggle" id="create-mail-handler">
        <span class="toggle-switch"></span>
        <span>{{createMailHandler}}
          <span class="field-help" data-tooltip="{{tooltipMailHandler}}">?</span>
        </span>
      </button>
      <div class="dialog-field" id="create-plugin-field" style="display:none">
        <label>{{createPlugin}}
          <span class="field-help" data-tooltip="{{tooltipPlugin}}">?</span>
        </label>
        <select id="create-plugin">
          <option value="">{{createPluginNone}}</option>
        </select>
      </div>
    </div>
    <div class="confirm-actions">
      <button class="btn-cancel" id="create-cancel">{{createCancel}}</button>
      <button class="btn-save" id="create-save" disabled>{{createSave}}</button>
    </div>
  </div>
</div>

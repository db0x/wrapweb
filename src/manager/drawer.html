<div>
  <div class="drawer-section-label">{{drawerAppearance}}</div>
  <div class="drawer-appearance-row">
    <button class="menu-item" id="menu-darkmode">
      <img id="menu-darkmode-icon" src="" alt="">
      <span id="menu-darkmode-label"></span>
    </button>
    <button class="drawer-icon-btn" id="menu-settings">
      <img data-icon="configure" width="16" height="16" alt="">
    </button>
  </div>
  <hr class="drawer-divider">
  <div class="drawer-section-label">{{drawerVisibility}}</div>
  <button class="menu-item" data-filter="all">
    <img data-icon="filterAll" alt="">
    <span>{{drawerAllApps}}</span>
  </button>
  <button class="menu-item" data-filter="public">
    <img data-icon="filterPublic" alt="">
    <span>{{drawerEmbeddedApps}}</span>
  </button>
  <button class="menu-item" data-filter="private">
    <img data-icon="filterPrivate" alt="">
    <span>{{drawerUserApps}}</span>
  </button>
  <button class="menu-item" data-filter="google">
    <img data-icon="filterGoogle" alt="">
    <span>{{drawerGoogle}}</span>
  </button>
  <button class="menu-item" data-filter="microsoft">
    <img data-icon="filterMicrosoft" alt="">
    <span>{{drawerMicrosoft}}</span>
  </button>
  <button class="menu-item menu-toggle" id="menu-hide-uninstalled">
    <span class="toggle-switch"></span>
    <span>{{drawerHideUninstalled}}</span>
  </button>
  <hr class="drawer-divider">
  <button class="menu-item" id="menu-profiles">
    <img data-icon="profiles" width="16" height="16" alt="">
    <span>{{drawerProfiles}}</span>
  </button>
  <hr class="drawer-divider">
  <div class="drawer-section-label">{{drawerRcloneSection}}</div>
  <button class="menu-item" id="menu-mail-handler">
    <img data-icon="mail" alt="">
    <span>{{drawerMailHandler}}</span>
  </button>
  <button class="menu-item" id="menu-safe-browsing">
    <img data-icon="googleSafeBrowsing" alt="">
    <span>{{drawerSafeBrowsing}}</span>
  </button>
  <button class="menu-item" id="menu-rclone">
    <img data-icon="rclone" alt="">
    <span>{{drawerRclone}}</span>
  </button>
  <button class="menu-item drawer-about-btn" id="menu-about">
    <span>{{drawerAbout}}</span>
  </button>
</div>

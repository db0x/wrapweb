<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5ab4f0"/>
      <stop offset="100%" stop-color="#1a7bc4"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="64" height="64" rx="13" fill="url(#g)"/>

  <!-- window body -->
  <rect x="8" y="13" width="48" height="38" rx="5" fill="white" opacity="0.12"/>

  <!-- title bar -->
  <rect x="8" y="13" width="48" height="13" rx="5" fill="white" opacity="0.28"/>
  <rect x="8" y="20" width="48" height="6"  fill="white" opacity="0.28"/>

  <!-- title bar / content separator -->
  <line x1="8" y1="26" x2="56" y2="26" stroke="white" stroke-width="0.8" opacity="0.35"/>

  <!-- window controls -->
  <circle cx="16" cy="19.5" r="2.3" fill="white" opacity="0.85"/>
  <circle cx="23" cy="19.5" r="2.3" fill="white" opacity="0.85"/>
  <circle cx="30" cy="19.5" r="2.3" fill="white" opacity="0.85"/>

  <!-- globe (web) -->
  <circle  cx="32" cy="39" r="10"   fill="none" stroke="white" stroke-width="2"/>
  <line    x1="22" y1="39" x2="42" y2="39"      stroke="white" stroke-width="1.5"/>
  <ellipse cx="32" cy="39" rx="5"  ry="10"  fill="none" stroke="white" stroke-width="1.5"/>
</svg>
